name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # 必须先设为 false，我们要手动递归处理

      - name: Fix Submodule Protocol & Recursive Sync
        run: |
          # 1. 处理第一层子模块：把 SSH 改为 HTTPS
          sed -i '' 's|git@github.com:|https://github.com/|g' .gitmodules
          sed -i '' 's|ssh://git@github.com/|https://github.com/|g' .gitmodules
          git submodule update --init --depth 1

          # 2. 递归处理嵌套子模块 (针对 hiddify-core 里的内容)
          # 我们进入子模块文件夹，重复修改并更新的操作
          find . -name ".gitmodules" -type f -exec sed -i '' 's|git@github.com:|https://github.com/|g' {} +
          find . -name ".gitmodules" -type f -exec sed -i '' 's|ssh://git@github.com/|https://github.com/|g' {} +
          
          # 强制同步所有子模块的 URL 配置
          git submodule sync --recursive
          # 递归更新所有子模块
          git submodule update --init --recursive --depth 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios

      - name: Install System Dependencies
        run: |
          brew install make base64

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Core Libraries
        run: |
          # 如果之前步骤成功，这里就能正常编译 libcore
          make ios-libs

      - name: Flutter Build iOS
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Hiddify_iOS_Unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-IPA
          path: build/ios/iphoneos/Hiddify_iOS_Unsigned.ipa
