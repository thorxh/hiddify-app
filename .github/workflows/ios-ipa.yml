name: Build iOS IPA (SDK Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Recursive Submodule Update
        run: |
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 尝试切换到最新版本以获取 3.10+ 的 Dart SDK
          channel: 'stable' 
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install System Dependencies
        run: brew install make base64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Run Build Runner
        run: |
          # 生成 *.g.dart 文件
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Core Libraries
        run: make ios-libs

      - name: Flutter Build iOS
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Hiddify_iOS.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-IPA
          path: build/ios/iphoneos/Hiddify_iOS.ipa
