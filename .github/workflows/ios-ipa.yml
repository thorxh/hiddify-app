name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: macos-14 # 使用 Apple Silicon 运行器速度更快
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # 初始不拉取，后面手动处理协议

      - name: Fix Submodule Protocol
        run: |
          # 强制将 SSH 协议替换为 HTTPS 协议，修复权限拒绝问题
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git submodule update --init --recursive --depth 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios

      - name: Install System Dependencies
        run: |
          brew install make base64

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Core Libraries
        run: |
          # Hiddify 构建 iOS 必须先编译底层的 libcore
          # 这一步通常调用 Makefile
          make ios-libs

      - name: Flutter Build iOS
        run: |
          # 构建 release 版本但不签名
          flutter build ios --release --no-codesign

      - name: Create IPA Package
        run: |
          # 创建 Payload 文件夹并打包 IPA
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Hiddify_iOS_Unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-IPA
          path: build/ios/iphoneos/Hiddify_iOS_Unsigned.ipa
          retention-days: 7
