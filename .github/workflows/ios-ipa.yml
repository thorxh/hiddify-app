name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # 必须先禁用自动拉取

      - name: Hard-Fix All Submodule Protocols
        run: |
          # 1. 设置全局替换（作为第一道防线）
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git://github.com/"

          # 2. 初始化第一层子模块并立即修改其内部配置
          git submodule update --init --depth 1
          
          # 3. 递归寻找并暴力修改所有 .gitmodules 文件
          # 这一步会进入 hiddify-core 等目录，将其中的 SSH 链接改为 HTTPS
          find . -name ".gitmodules" -type f -exec sed -i '' 's|git@github.com:|https://github.com/|g' {} +
          find . -name ".gitmodules" -type f -exec sed -i '' 's|ssh://git@github.com/|https://github.com/|g' {} +
          
          # 4. 强制同步配置到 .git/config
          git submodule sync --recursive
          
          # 5. 执行递归更新
          # 如果此时还报错，说明嵌套层级在拉取过程中又产生了动态的 SSH 链接
          # 我们增加一个“多级拉取”策略
          git submodule update --init --recursive --depth 1 --jobs 4 || (
            echo "First recursive update failed, retrying after syncing again..."
            git submodule sync --recursive
            git submodule update --init --recursive --depth 1 --jobs 4
          )

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install System Dependencies
        run: brew install make base64

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Core Libraries
        run: make ios-libs

      - name: Flutter Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Hiddify_Fixed_Protocol.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-IPA
          path: build/ios/iphoneos/Hiddify_Fixed_Protocol.ipa
