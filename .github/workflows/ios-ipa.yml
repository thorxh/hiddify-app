name: Build iOS IPA (Final Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Recursive Submodule Update
        run: |
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 升级到较新的 stable 版本，以匹配最新的 hiddify 依赖要求
          flutter-version: '3.27.3' 
          channel: 'stable'
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install System Dependencies
        run: |
          brew install make base64

      - name: Flutter Pub Get
        run: |
          # 增加 --allow-dirty 或类似处理确保环境纯净
          flutter pub get

      - name: Run Build Runner (CRITICAL FIX)
        run: |
          # 这一步修复你之前遇到的 state/ref 报错
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Core Libraries
        run: make ios-libs

      - name: Flutter Build iOS
        run: |
          # 生成无签名包
          flutter build ios --release --no-codesign

      - name: Create IPA Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Hiddify_iOS_Build.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-IPA
          path: build/ios/iphoneos/Hiddify_iOS_Build.ipa
          retention-days: 7
