name: Hiddify iOS Auto-Sign Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 1. 证书安装与环境配置
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          # 1. 解码文件
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode > $CERT_PATH
          echo -n "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          # 2. 创建并解锁钥匙串
          security create-keychain -p "actions_pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions_pwd" $KEYCHAIN_PATH

          # 3. 导入 P12 (强制返回成功)
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign || true
          
          # 4. 授权 (强制返回成功)
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions_pwd" $KEYCHAIN_PATH || true

          # 5. 安装描述文件 (增加容错逻辑)
          # 使用 perl 替代 grep 以提高在 Actions 环境下的兼容性
          UUID=$(grep -aA1 "UUID" $PP_PATH | grep -o "[-A-Z0-9]\{36\}" || echo "NOT_FOUND")
          
          if [ "$UUID" = "NOT_FOUND" ]; then
            echo "错误：无法从描述文件中提取 UUID"
            exit 1
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Success: Installed Profile $UUID"

      - name: 2. Flutter Build Archive
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign

      - name: 3. Xcode 签名与导出
        env:
          EXPORT_PLIST: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                "com.fcnwU.8bQIrhD": "irv95H"
                "com.fcnwU.8bQIrhD.HiddifyPacketTunnel": "irv95H"
              </dict>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_PLIST" > ExportOptions.plist
          
          # 导出并捕获日志
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/signed_final \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -verbose > xcodebuild_log.txt 2>&1 || (tail -n 100 xcodebuild_log.txt && exit 1)

      - name: 4. 上传成品
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Build-Package
          path: |
            build/ios/signed_final/*.ipa
            xcodebuild_log.txt
