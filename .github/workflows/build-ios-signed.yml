name: Hiddify iOS Production Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 1. 证书与环境安装
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode > $CERT_PATH
          echo -n "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          # 精确提取描述文件名称 (Name)
          # 使用更严谨的 grep 逻辑，只取 <key>Name</key> 下的一行
          REAL_NAME=$(grep -aA1 "<key>Name</key>" $PP_PATH | grep "<string>" | sed -E 's/<\/?string>//g' | xargs)
          echo "==== [CONFIRM] Profile Name is: $REAL_NAME ===="

          # 创建钥匙串
          security create-keychain -p "actions_pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions_pwd" $KEYCHAIN_PATH

          # 导入 P12
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions_pwd" $KEYCHAIN_PATH

          # 安装描述文件
          UUID=$(grep -aA1 "UUID" $PP_PATH | grep -o "[-A-Z0-9]\{36\}")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          
          echo "==== [CONFIRM] Keychain Identity ===="
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: 2. Flutter Build Archive
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign

      - name: 3. Export and Sign
        env:
          # 注意：这里的 Value 必须是 "irv95H"
          EXPORT_PLIST: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                "com.fcnwU.8bQIrhD": "irv95H"
                "com.fcnwU.8bQIrhD.HiddifyPacketTunnel": "irv95H"
              </dict>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_PLIST" > ExportOptions.plist
          
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/signed_final \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: 4. Upload
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Ready
          path: build/ios/signed_final/*.ipa
