name: Hiddify iOS Auto-Sign Final Force

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 1. 证书安装 (强制跳过警告)
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode > $CERT_PATH
          echo -n "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "actions_pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions_pwd" $KEYCHAIN_PATH

          echo -n "# 导入 P12，加上 || true"

          # 导入 P12，加上 || true
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign || true
          
          echo -n "# 关键：静默授权，忽略一切警告"

          # 关键：静默授权，忽略一切警告
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions_pwd" $KEYCHAIN_PATH || true


          echo -n "# 安装描述文件 (UUID 命名)"

          # 安装描述文件 (UUID 命名)
          UUID=$(grep -aA1 "UUID" $PP_PATH | grep -o "[-A-Z0-9]\{36\}")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          
          echo -n "# 仅作为日志打印，即便失败也不中断任务"

          # 仅作为日志打印，即便失败也不中断任务
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true

      - name: 2. Flutter Build (无签名模式)
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign

      - name: 3. Xcode 签名与导出 (错误深度排查)
        env:
          EXPORT_PLIST: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                "com.fcnwU.8bQIrhD": "irv95H"
                "com.fcnwU.8bQIrhD.HiddifyPacketTunnel": "irv95H"
              </dict>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_PLIST" > ExportOptions.plist
          
          # 如果导出失败，将打印最后 100 行详细日志
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/signed_final \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -verbose > xcodebuild_log.txt 2>&1 || (tail -n 100 xcodebuild_log.txt && exit 1)

      - name: 4. 上传
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Build-Results
          path: |
            build/ios/signed_final/*.ipa
            xcodebuild_log.txt
