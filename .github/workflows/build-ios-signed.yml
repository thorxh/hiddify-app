name: Hiddify iOS Pro Sign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 建议与项目 pubspec.yaml 要求的版本一致

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          # 定义路径变量
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 解码文件 (使用 echo -n 防止换行符干扰)
          echo -n "$P12_BASE64" | base64 --decode > $CERT_PATH
          echo -n "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          # 创建临时钥匙串
          security create-keychain -p "actions_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions_password" $KEYCHAIN_PATH

          # 导入证书并设置权限
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions_password" $KEYCHAIN_PATH

          # 将描述文件放入系统目录
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # 注意：系统要求描述文件文件名必须是其 UUID。
          # 这里通过命令提取 UUID 重命名，确保签名能找到它
          UUID=$(mobileprovision-read -p $PP_PATH -o UUID)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Flutter Build Archive
        run: |
          flutter pub get
          # 构建 Archive，但不在此步签名
          flutter build ipa --release --no-codesign

      - name: Export and Sign IPA
        env:
          # 这里的 Bundle ID 必须与你 Base.xcconfig 里的一致
          # 且与你的描述文件内容一致
          EXPORT_PLIST: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                "apple.hiddify.com": "你的描述文件名称"
                "apple.hiddify.com.HiddifyPacketTunnel": "你的描述文件名称"
              </dict>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_PLIST" > ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/signed_ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Signed-Ready
          path: build/ios/signed_ipa/*.ipa
