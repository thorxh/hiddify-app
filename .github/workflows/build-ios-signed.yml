name: Build iOS IPA (Signed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Recursive Submodule Update
        run: |
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 
          cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install System Dependencies
        run: brew install make base64

      # --- 关键：在此处插入证书安装逻辑 ---
      - name: Setup Signing Identity
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          FIXED_UUID="a98b7f98-3d85-4150-9e63-02cd9aaa65f7"
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode > $CERT_PATH
          echo -n "$PROVISION_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "actions_pwd" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions_pwd" $KEYCHAIN_PATH
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign || true
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions_pwd" $KEYCHAIN_PATH || true

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$FIXED_UUID.mobileprovision

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Run Build Runner
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Core Libraries
        run: make ios-libs

      # --- 关键修改：执行 Archive 流程 ---
      - name: Flutter Build Archive
        run: |
          # 使用 --no-codesign 准备 Xcode 项目，但通过命令行参数强制注入签名配置进行 Archive
          flutter build ios --release --no-codesign
          
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/ios/archive/Runner.xcarchive \
                     archive \
                     CODE_SIGN_STYLE=Manual \
                     DEVELOPMENT_TEAM=9HT574YRU9 \
                     PROVISIONING_PROFILE_SPECIFIER=irv95H

      # --- 关键修改：使用 ExportOptions 导出正式 IPA ---
      - name: Create Signed IPA Package
        env:
          EXPORT_PLIST: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                "com.fcnwU.8bQIrhD": "irv95H"
                "com.fcnwU.8bQIrhD.HiddifyPacketTunnel": "irv95H"
              </dict>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_PLIST" > ExportOptions.plist
          xcodebuild -exportArchive \
                     -archivePath build/ios/archive/Runner.xcarchive \
                     -exportPath build/ios/signed_final \
                     -exportOptionsPlist ExportOptions.plist \
                     -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Signed-IPA
          path: build/ios/signed_final/*.ipa
